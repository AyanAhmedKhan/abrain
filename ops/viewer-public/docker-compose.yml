# gbrain public graph viewer — password-protected, isolated.
# Uses the existing traefik via labels; does NOT modify n8n or traefik.
# Take down:  docker compose -f /opt/gbrain/ops/viewer-public/docker-compose.yml down
services:
  gbrain-viewer:
    image: nginx:alpine
    container_name: gbrain-viewer-public
    restart: always
    volumes:
      - /opt/gbrain/viewer:/usr/share/nginx/html:ro
      - /opt/gbrain/ops/viewer-public/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [root_default]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.gbrain.rule=Host(`brain.srv957712.hstgr.cloud`)"
      - traefik.http.routers.gbrain.entrypoints=web,websecure
      - traefik.http.routers.gbrain.tls=true
      - traefik.http.routers.gbrain.tls.certresolver=mytlschallenge
      - traefik.http.services.gbrain.loadbalancer.server.port=80
      - "traefik.http.middlewares.gbrain-auth.basicauth.users=dexter:$$apr1$$nHAkBRLf$$PI60T0x6rct4fL57by8v2."
      - traefik.http.routers.gbrain.middlewares=gbrain-auth@docker
networks:
  root_default:
    external: true
